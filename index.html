<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>دستیار هوشمند شخصی</title>
    <link rel="manifest" href="/manifest.webmanifest?v=2">
    <meta name="theme-color" content="#F4F5F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="/icon-192.png?v=2">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: {
          fontFamily: {
            sans: ['Vazirmatn', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            mono: ['Vazirmatn', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace']
          },
          colors: {
            primary:        'rgb(var(--color-primary-rgb) / <alpha-value>)',
            'primary-hover':'rgb(var(--color-primary-hover-rgb) / <alpha-value>)',
            'primary-text': 'rgb(var(--color-primary-text-rgb) / <alpha-value>)',
            'on-primary':   'rgb(var(--on-primary-rgb) / <alpha-value>)',
            main:           'rgb(var(--text-main-rgb) / <alpha-value>)',
            muted:          'rgb(var(--text-muted-rgb) / <alpha-value>)',
            subtle:         'rgb(var(--border-subtle-rgb) / <alpha-value>)',
            success:        'rgb(var(--success-rgb) / <alpha-value>)',
            error:          'rgb(var(--error-rgb) / <alpha-value>)',
            warning:        'rgb(var(--warning-rgb) / <alpha-value>)',
            'project-sky': 'rgb(var(--project-color-sky-rgb) / <alpha-value>)',
            'project-red': 'rgb(var(--project-color-red-rgb) / <alpha-value>)',
            'project-green': 'rgb(var(--project-color-green-rgb) / <alpha-value>)',
            'project-yellow': 'rgb(var(--project-color-yellow-rgb) / <alpha-value>)',
            'project-purple': 'rgb(var(--project-color-purple-rgb) / <alpha-value>)',
            'project-gray': 'rgb(var(--project-color-gray-rgb) / <alpha-value>)',
          }
        } }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
        background-color: transparent;
      }
    </style>
    <link rel="stylesheet" href="/index.css">
    <script>
      (function () {
        var t = localStorage.getItem('hexer-theme');
        var isDark = t === 'dark';
        if (isDark) document.documentElement.classList.add('dark');

        var ct = localStorage.getItem('hexer-color-theme');
        if (ct === 'blue' || ct === 'purple') {
          document.documentElement.setAttribute('data-color-theme', ct);
        }
        // اگر ct نامعتبر/خالی بود، attribute اصلاً ست نمی‌شود → پیش‌فرضِ :root (سبز) اعمال می‌شود.

        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', isDark ? '#121212' : '#F4F5F7');
      })();
    </script>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.86.2",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>
</head>
<body>
    <noscript>برای اجرای این برنامه به جاوااسکریپت نیاز دارید.</noscript>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
